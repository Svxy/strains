<body class="bg-dark-red text-white">

<div class="container mt-5">
    <img src="./img/icon.png" alt="Strain List Logo" class="mx-auto d-block mb-4">
    <h1 class="text-center">Strain List</h1>
    <p class="text-center mb-4">A comprehensive list of weed strains I've tried.<br><sup>Ratings may update over time.</sup></p>
  
    <div class="text-center mb-4">
        <button class="btn btn-primary mr-2" onclick="filterStrains('all')">Show All</button>
        <button class="btn btn-success mr-2" onclick="filterStrains('good')">Good Effects</button>
        <button class="btn btn-danger" onclick="filterStrains('bad')">Bad Effects</button>
    </div>

    <div id="strainList" class="list-group mt-4"></div>
